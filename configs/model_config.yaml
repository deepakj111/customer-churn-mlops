# configs/model_config.yaml

model_name: customer-churn-lgbm          # <-- was "name:", that's the root cause
algorithm: lightgbm
champion_stage: Staging
registered_model_name: customer-churn-lgbm

hyperparameters:
  n_estimators: 300
  learning_rate: 0.05
  num_leaves: 31
  max_depth: -1
  min_child_samples: 20
  scale_pos_weight: 2.76
  subsample: 0.8
  colsample_bytree: 0.8
  random_state: 42

cost_matrix:
  false_negative_cost: 500.0
  false_positive_cost: 20.0

risk_tiers:
  high_risk_threshold: 0.60
  medium_risk_threshold: 0.35

performance_gates:
  min_roc_auc: 0.82
  min_pr_auc: 0.65
  min_recall_at_threshold: 0.70
