# Controls how training runs are structured.
# Separated from model_config.yaml so experiment structure and
# model hyperparameters can be versioned independently.

# Data split ratios — must sum to 1.0
# 70% train, 10% val (threshold tuning), 20% test (final held-out evaluation)
test_size: 0.2
val_size: 0.1

random_seed: 42
cv_folds: 5

# MLflow experiment name — all training runs group under this name on DagsHub
experiment_name: churn-prediction

# Business cost matrix for threshold optimization in src/models/threshold.py
# fn_cost: estimated revenue lost from one missed churner (annual contract value)
# fp_cost: cost of one unnecessary retention offer (discount + agent time)
fn_cost: 500.0
fp_cost: 20.0
