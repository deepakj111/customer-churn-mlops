# ============================================================================
# CD Pipeline — Build and Publish Docker Images
#
# Triggered on:
#   - Push to main branch
#
# Jobs:
#   1. build-and-push: Builds Docker images and pushes to GHCR
#
# Note:
#   - This workflow requires the `contents: read` and `packages: write`
#     permissions to push to the GitHub Container Registry.
# ============================================================================

name: CD Pipeline

on:
  push:
    branches: [main]

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Permissions needed to push to GHCR
permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase GitHub repository owner
        id: downcase_owner
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Build and Push API Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.downcase_owner.outputs.owner }}/churn-api:latest
            ghcr.io/${{ steps.downcase_owner.outputs.owner }}/churn-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Dashboard Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.streamlit
          push: true
          tags: |
            ghcr.io/${{ steps.downcase_owner.outputs.owner }}/churn-dashboard:latest
            ghcr.io/${{ steps.downcase_owner.outputs.owner }}/churn-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
