# ============================================================================
# CI Pipeline — Lint, Test, Build
#
# Triggered on:
#   - Push to main branch
#   - Pull requests to main branch
#
# Jobs:
#   1. lint    — black, isort, flake8 formatting checks
#   2. test    — Full pytest suite with coverage report
#   3. build   — Docker image build validation (no push)
#
# Design decisions:
#   - lint and test run in parallel (independent).
#   - build depends on both lint and test passing.
#   - Poetry dependencies are cached to speed up repeated runs.
#   - Secrets for MLflow/DagsHub are injected via GitHub repo secrets.
# ============================================================================

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch to save CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "2.3.3"

jobs:
  # --------------------------------------------------------------------------
  # Job 1: Lint — check formatting and style
  # --------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install "poetry==${{ env.POETRY_VERSION }}"

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: poetry-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Check formatting (black)
        run: poetry run black --check src/ tests/ scripts/

      - name: Check import sorting (isort)
        run: poetry run isort --check-only src/ tests/ scripts/

      - name: Lint (flake8)
        run: poetry run flake8 src/ tests/ scripts/

  # --------------------------------------------------------------------------
  # Job 2: Test — full pytest suite with coverage
  # --------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install "poetry==${{ env.POETRY_VERSION }}"

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: poetry-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --no-interaction

      # DVC pull requires the raw dataset for data validation tests.
      # If secrets aren't available (e.g. fork PRs), tests that need
      # the CSV will be skipped via the conftest marker.
      - name: Pull data with DVC
        run: |
          poetry run dvc remote modify origin --local auth basic
          poetry run dvc remote modify origin --local user ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          poetry run dvc remote modify origin --local password ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
          poetry run dvc pull

      - name: Run tests with coverage
        run: poetry run pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  # --------------------------------------------------------------------------
  # Job 3: Build — validate Docker image builds successfully
  # --------------------------------------------------------------------------
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: churn-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Dashboard image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.streamlit
          push: false
          tags: churn-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
